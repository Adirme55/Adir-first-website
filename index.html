<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>אדיר מגידיש</title>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff9f0;
      color: #2e2e2e;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── TOPBAR ── */
    .topbar {
      background: #ff6c4f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      height: 64px;
    }
    .topbar-name {
      font-size: 18px;
      font-weight: 800;
      color: #fff;
    }
    .topbar-icon {
      width: 40px; height: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    /* ── HERO ── */
    .hero {
      background: #fff9f0;
      padding: 28px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }
    .hero-card {
      width: 100%;
      height: 480px;
      border-radius: 32px;
      border: 3px solid #724ce4;
      overflow: hidden;
      position: relative;
    }
    .hero-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-card-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 40%, rgba(0,0,0,0.55) 100%);
      border-radius: 32px;
    }
    .hero-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hero-name {
      font-size: clamp(40px, 10vw, 72px);
      font-weight: 800;
      color: #fff;
      line-height: 0.9;
      letter-spacing: -0.02em;
      text-align: right;
    }
    .hero-title {
      font-size: 16px;
      font-weight: 600;
      color: rgba(255,255,255,0.8);
      text-align: right;
    }

    /* ── ACTION BUTTONS ── */
    .actions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }
    .btn-action {
      display: flex; align-items: center; justify-content: center;
      border: none; cursor: pointer;
      font-size: 24px;
      box-shadow: 0 8px 10px rgba(0,0,0,0.1);
    }
    .btn-skip {
      width: 64px; height: 64px;
      border-radius: 32px;
      background: #ffd92b;
      border: 1px solid #fff;
    }
    .btn-like {
      width: 88px; height: 88px;
      border-radius: 44px;
      background: #ff6c4f;
      font-size: 32px;
      box-shadow: 0 10px 12px rgba(0,0,0,0.12);
    }
    .btn-star {
      width: 64px; height: 64px;
      border-radius: 32px;
      background: #2cd69a;
      border: 1px solid #fff;
    }

    /* ── STORIES ── */
    .story-strip {
      background: #fff;
      padding: 0 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding-top: 16px;
    }
    .label-purple { color: #724ce4; }
    .story-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: center;
    }
    .story-circle {
      width: 72px; height: 72px;
      border-radius: 50%;
      border: 3px solid;
      overflow: hidden;
      flex-shrink: 0;
    }
    .story-circle img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .story-1 { border-color: #ff6c4f; }
    .story-2 { border-color: #ffd92b; }
    .story-3 { border-color: #724ce4; }
    .story-4 { border-color: #2cd69a; }
    .story-5 { border-color: #ff63a5; }

    /* ── BIO ── */
    .bio {
      background: #fff9f0;
      padding: 0 24px 56px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }
    .bio-text {
      font-size: 16px;
      line-height: 1.6;
      color: #2e2e2e;
      max-width: 600px;
    }

    /* ── FOOTER ── */
    .footer {
      background: #ff6c4f;
      padding: 20px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .footer p {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-name">אדיר מגידיש</div>
    <div class="topbar-icon">🤍</div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-card">
      <img src="images/img4.jpg" alt="אדיר מגידיש"/>
      <div class="hero-card-gradient"></div>
      <div class="hero-overlay">
        <div class="hero-name">אדיר מגידיש</div>
        <div class="hero-title">Senior Product Designer · Bazaart</div>
      </div>
    </div>

    <div class="actions-row">
      <button class="btn-action btn-skip">✕</button>
      <button class="btn-action btn-like">🤍</button>
      <button class="btn-action btn-star">⭐</button>
    </div>
  </div>

  <!-- STORIES -->
  <div class="story-strip">
    <div class="section-label label-purple">STORIES</div>
    <div class="story-row">
      <div class="story-circle story-1"><img src="images/img0.jpg" alt=""/></div>
      <div class="story-circle story-2"><img src="images/img1.jpg" alt=""/></div>
      <div class="story-circle story-3"><img src="images/img2.jpg" alt=""/></div>
      <div class="story-circle story-4"><img src="images/img3.jpg" alt=""/></div>
      <div class="story-circle story-5"><img src="images/img5.jpg" alt=""/></div>
    </div>
  </div>

  <!-- BIO -->
  <div class="bio">
    <div class="section-label label-purple">ABOUT</div>
    <p class="bio-text">
      מעצב מוצר בכיר עם 10+ שנות ניסיון. AI tools, web editors, e-commerce.<br>
      לשעבר Vimeo ו-Magisto 🎨
    </p>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <p>© 2026 אדיר מגידיש</p>
  </div>

</body>
</html>
